<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCLI Dashboard - AI Network Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .terminal-font {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .mode-active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        @keyframes pulse-border {
            0%   { border-color: rgba(59, 130, 246, 0.5); }
            50%  { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .ai-loading { animation: pulse-border 2s infinite; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-left">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent mb-2">
                    AutoCLI Tool <span class="text-sm font-light italic opacity-70">Pro Edition</span>
                </h1>
                <p class="text-slate-400 uppercase tracking-tighter text-sm font-semibold">Automazione Intelligente per Network Admin & DevOps</p>
            </div>
            <!-- Powered by Claude badge -->
            <div class="flex items-center gap-2 bg-slate-800/50 px-4 py-2 rounded-xl border border-slate-700 text-xs text-slate-400">
                <svg class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 14.094A5.973 5.973 0 004 17v1H1v-1a3 3 0 013.75-2.906z"/></svg>
                Powered by <span class="text-blue-300 font-bold ml-1">Claude AI</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Pannello di Creazione -->
            <div class="lg:col-span-1">
                <div id="configPanel" class="glass-card p-6 rounded-2xl sticky top-8 transition-all">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="mr-2">🚀</span> Generatore Avanzato
                    </h2>

                    <div class="space-y-6">
                        <!-- Modalità -->
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Piattaforma Target</label>
                            <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 rounded-xl border border-slate-700">
                                <button onclick="setMode('standard')" id="mode-standard" class="py-2 text-sm rounded-lg transition-all mode-active">Shell Standard</button>
                                <button onclick="setMode('cisco')" id="mode-cisco" class="py-2 text-sm rounded-lg transition-all text-slate-400">Cisco IOS</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Cosa vuoi configurare?</label>
                            <div class="relative">
                                <input id="taskName" type="text" placeholder="es. VLAN 100 su GigabitEthernet 0/1"
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <button onclick="generateWithAI()" id="aiBtn"
                                    class="absolute right-2 top-1.5 p-1.5 bg-blue-600 hover:bg-blue-500 rounded-md transition-colors"
                                    title="Genera con IA">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 5.323V3a1 1 0 011-1z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Preview Comandi</label>
                            <textarea id="taskCmds" rows="8"
                                placeholder="I comandi verranno generati con la gerarchia corretta..."
                                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all terminal-font text-sm leading-relaxed"></textarea>
                        </div>

                        <button onclick="saveTask()"
                            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-indigo-500/20">
                            Salva nel Database
                        </button>
                    </div>
                </div>
            </div>

            <!-- Elenco Task -->
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Libreria Configurazione</h2>
                    <button onclick="clearAll()"
                        class="text-sm text-red-400 hover:text-red-300 transition-colors bg-red-500/10 px-3 py-1 rounded-lg">
                        Svuota Tutto
                    </button>
                </div>

                <div id="tasksList" class="space-y-6"></div>

                <div id="emptyState" class="text-center py-20 bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-700 hidden">
                    <p class="text-slate-500 italic">Nessun comando in archivio.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"
        class="fixed bottom-8 right-8 bg-blue-500 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        Copiato negli appunti!
    </div>

    <script>
        // ─── State ────────────────────────────────────────────────────────────────
        let tasks = JSON.parse(localStorage.getItem('autocli_tasks_v4')) || [];
        let currentMode = 'standard';

        // ─── Mode selector ────────────────────────────────────────────────────────
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-standard').className =
                mode === 'standard'
                    ? 'py-2 text-sm rounded-lg transition-all mode-active'
                    : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            document.getElementById('mode-cisco').className =
                mode === 'cisco'
                    ? 'py-2 text-sm rounded-lg transition-all mode-active'
                    : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            document.getElementById('taskName').placeholder =
                mode === 'cisco'
                    ? 'es. VLAN 100 su GigabitEthernet 0/1'
                    : 'es. Crea cartella logs e sposta i .txt';
        }

        // ─── AI generation via Claude API ─────────────────────────────────────────
        async function generateWithAI() {
            const promptInput = document.getElementById('taskName');
            const cmdOutput  = document.getElementById('taskCmds');
            const aiBtn      = document.getElementById('aiBtn');
            const panel      = document.getElementById('configPanel');

            if (!promptInput.value.trim()) return;

            aiBtn.disabled = true;
            panel.classList.add('ai-loading');
            cmdOutput.placeholder = 'Generazione in corso con Claude AI…';
            cmdOutput.value = '';

            const systemPrompt = `Sei un Senior Network Engineer specializzato in automazione CLI.
Genera una lista di comandi per la seguente richiesta.
Target: ${currentMode === 'cisco' ? 'Cisco IOS' : 'Shell Linux/Bash'}.

REGOLE FERREE:
- Se "cisco": inizia SEMPRE con "enable" poi "configure terminal". Includi i comandi necessari e termina con "end" poi "write memory".
- Se "standard": genera comandi Bash/Linux concatenabili.
- Rispondi SOLO con il codice dei comandi, un comando per riga.
- NON usare markdown (\`\`\`), NON aggiungere commenti, intestazioni o spiegazioni di qualsiasi tipo.`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: [
                            { role: 'user', content: promptInput.value.trim() }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    const errMsg = data?.error?.message || `Errore HTTP ${response.status}`;
                    cmdOutput.value = `ERRORE API: ${errMsg}`;
                    showToast('Errore durante la generazione.');
                    return;
                }

                // Estrai il testo dalla risposta (possibile mix text / tool_use)
                const text = (data.content || [])
                    .filter(b => b.type === 'text')
                    .map(b => b.text)
                    .join('\n');

                cmdOutput.value = text
                    .replace(/```[a-z]*\n?/gi, '')
                    .replace(/```/g, '')
                    .trim();

                showToast('Comandi generati con Claude!');
            } catch (err) {
                cmdOutput.value = `ERRORE DI RETE:\n${err.message}`;
                showToast('Errore di connessione.');
            } finally {
                aiBtn.disabled = false;
                panel.classList.remove('ai-loading');
            }
        }

        // ─── Task management ──────────────────────────────────────────────────────
        function saveTask() {
            const name = document.getElementById('taskName').value.trim();
            const cmds = document.getElementById('taskCmds').value.trim();
            if (!name || !cmds) {
                showToast('Compila i campi prima di salvare!');
                return;
            }
            tasks.unshift({
                id: Date.now(),
                name,
                mode: currentMode,
                commands: cmds.split('\n').filter(c => c.trim())
            });
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            renderTasks();
            document.getElementById('taskName').value = '';
            document.getElementById('taskCmds').value = '';
            showToast('Salvato!');
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            renderTasks();
        }

        async function copyCommands(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const text = task.mode === 'cisco'
                ? task.commands.join('\n')
                : task.commands.join(' && ');
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copiato negli appunti!');
            } catch {
                showToast('Errore durante la copia.');
            }
        }

        function clearAll() {
            if (confirm('Sei sicuro di voler svuotare tutta la libreria?')) {
                tasks = [];
                localStorage.removeItem('autocli_tasks_v4');
                renderTasks();
            }
        }

        // ─── Rendering ────────────────────────────────────────────────────────────
        // FIX: usa textContent/createElement invece di innerHTML per i dati utente
        // per evitare XSS injection.
        function renderTasks() {
            const list  = document.getElementById('tasksList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';

            if (!tasks.length) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-2xl border-l-4 ${
                    t.mode === 'cisco' ? 'border-l-blue-500' : 'border-l-emerald-500'
                } hover:shadow-xl transition-all`;

                // Header row
                const header = document.createElement('div');
                header.className = 'flex justify-between items-start mb-4';

                const titleBlock = document.createElement('div');
                const h3 = document.createElement('h3');
                h3.className = 'font-bold text-lg';
                h3.textContent = t.name; // ← textContent, non innerHTML

                const badge = document.createElement('span');
                badge.className = 'text-[10px] font-black tracking-widest uppercase bg-slate-900 px-2 py-1 rounded text-slate-500';
                badge.textContent = t.mode;

                titleBlock.appendChild(h3);
                titleBlock.appendChild(badge);

                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex space-x-2';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs transition-colors';
                copyBtn.textContent = 'Copia';
                copyBtn.onclick = () => copyCommands(t.id);

                const delBtn = document.createElement('button');
                delBtn.className = 'p-2 bg-red-900/20 text-red-500 hover:bg-red-900/40 rounded-lg text-xs transition-colors';
                delBtn.textContent = 'Elimina';
                delBtn.onclick = () => deleteTask(t.id);

                btnGroup.appendChild(copyBtn);
                btnGroup.appendChild(delBtn);
                header.appendChild(titleBlock);
                header.appendChild(btnGroup);

                // Commands block
                const codeBlock = document.createElement('div');
                codeBlock.className = 'bg-slate-950 p-4 rounded-xl text-xs terminal-font text-slate-400 border border-slate-800';

                t.commands.forEach(cmd => {
                    const line = document.createElement('div');
                    line.className = 'flex';

                    const prompt = document.createElement('span');
                    prompt.className = 'text-slate-700 mr-2';
                    prompt.textContent = '$';

                    const cmdSpan = document.createElement('span');
                    cmdSpan.textContent = cmd; // ← textContent, no XSS

                    line.appendChild(prompt);
                    line.appendChild(cmdSpan);
                    codeBlock.appendChild(line);
                });

                card.appendChild(header);
                card.appendChild(codeBlock);
                list.appendChild(card);
            });
        }

        // ─── Toast ────────────────────────────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // ─── Init ─────────────────────────────────────────────────────────────────
        renderTasks();
    </script>
</body>
</html>
