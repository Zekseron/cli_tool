<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCLI — AI Network Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #21262d;
      --border:  #30363d;
      --border2: #484f58;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --dim:     #6e7681;
      --blue:    #58a6ff;
      --green:   #3fb950;
      --amber:   #d29922;
      --red:     #f85149;
      --cisco:   #1ba1e2;
      --shell:   #3fb950;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    .topbar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .dots { display: flex; gap: 7px; }
    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot-r { background: #f85149; }
    .dot-y { background: #d29922; }
    .dot-g { background: #3fb950; }
    .topbar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--muted);
    }
    .topbar-title span { color: var(--blue); font-weight: 700; }
    .topbar-sub {
      margin-left: auto;
      font-size: 11px;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
    }
    .topbar-sub span { color: var(--green); }

    /* ── Main grid ──────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 24px;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 7px;
    }

    /* Mode tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg3);
      padding: 3px;
      border-radius: 9px;
      border: 1px solid var(--border);
    }
    .tab {
      padding: 7px 8px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
      color: var(--muted);
      background: transparent;
    }
    .tab.active-cisco  { background: #0d2f40; color: var(--cisco);  border-color: #1ba1e230; }
    .tab.active-shell  { background: #0d2b1a; color: var(--shell);  border-color: #3fb95030; }

    /* Textarea prompt */
    .input-wrap { position: relative; }
    .prompt-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 42px 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: vertical;
      line-height: 1.55;
      transition: border-color .15s;
    }
    .prompt-input::placeholder { color: var(--dim); }
    .prompt-input:focus { border-color: var(--blue); }

    .gen-btn {
      position: absolute;
      right: 9px;
      top: 9px;
      background: var(--blue);
      border: none;
      border-radius: 7px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #0d1117;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .gen-btn:hover   { opacity: .85; }
    .gen-btn:disabled { opacity: .35; cursor: default; }

    /* Preview */
    .preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px;
      min-height: 130px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.75;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .preview.idle    { color: var(--dim); font-style: italic; }
    .preview.loading { color: var(--amber); animation: blink 1s step-end infinite; }
    .preview.error   { color: var(--red); }
    @keyframes blink { 50% { opacity: .35; } }

    /* Save button */
    .save-btn {
      width: 100%;
      background: #0d2b1a;
      border: 1px solid #3fb95045;
      border-radius: 9px;
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .15s;
    }
    .save-btn:hover { background: #143d20; }

    /* ── Library panel ───────────────────────────────────── */
    .library {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lib-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--red);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
      opacity: .7;
    }
    .clear-btn:hover { opacity: 1; border-color: var(--red); }

    /* Search bar */
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 13px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .15s;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: var(--blue); }
    .search-input:focus + .ask-btn { border-color: var(--blue); }

    .ask-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 15px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      transition: all .15s;
    }
    .ask-btn:hover { border-color: var(--blue); background: #0d1e33; }

    /* Cards */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card-head {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-cisco { background: #0d2f40; color: var(--cisco); }
    .badge-shell { background: #0d2b1a; color: var(--shell); }

    .card-cmds {
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.8;
    }
    .cmd-line { display: flex; gap: 9px; align-items: baseline; }
    .prompt-sym { color: var(--border2); user-select: none; }
    .cmd-text { color: var(--text); }

    .explain-block {
      margin: 0 14px 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
    }

    .card-foot {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .foot-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }
    .foot-btn:hover          { color: var(--text);  border-color: var(--border2); }
    .foot-btn.danger:hover   { color: var(--red);   border-color: var(--red); }
    .foot-btn.explain:hover  { color: var(--amber); border-color: var(--amber); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--dim);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 2;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg3);
      border: 1px solid var(--green);
      border-radius: 9px;
      padding: 9px 16px;
      font-size: 12px;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      transform: translateY(70px);
      opacity: 0;
      transition: all .28s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err  { border-color: var(--red); color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>

<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="topbar-title"><span>AutoCLI</span> — AI Network Terminal</div>
    <div class="topbar-sub">powered by <span>Claude AI</span></div>
  </header>

  <!-- Main grid -->
  <div class="grid">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div>
        <div class="label">Piattaforma</div>
        <div class="tabs">
          <button class="tab active-shell" id="tab-shell" onclick="setMode('shell')">Shell</button>
          <button class="tab" id="tab-cisco" onclick="setMode('cisco')">Cisco IOS</button>
        </div>
      </div>

      <div>
        <div class="label">Richiesta</div>
        <div class="input-wrap">
          <textarea class="prompt-input" id="promptInput" rows="3"
            placeholder="es. Crea backup giornaliero con cron e rsync..."
            onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))generateCmds()"></textarea>
          <button class="gen-btn" id="genBtn" onclick="generateCmds()" title="Genera (Ctrl+Invio)">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
        <p style="font-size:10px;color:var(--dim);margin-top:5px;text-align:right">Ctrl+Invio per generare</p>
      </div>

      <div>
        <div class="label">Preview comandi</div>
        <div class="preview idle" id="preview">// i comandi appariranno qui</div>
      </div>

      <button class="save-btn" onclick="saveTask()">+ Salva in libreria</button>

    </aside>

    <!-- Library -->
    <main class="library">

      <div class="lib-header">
        <span class="lib-title">Libreria</span>
        <button class="clear-btn" onclick="clearAll()">Svuota tutto</button>
      </div>

      <div class="search-row">
        <input class="search-input" id="searchInput"
          placeholder='Cerca con l'AI: "mostra tutto sulle VLAN"...'
          onkeydown="if(event.key==='Enter')searchTasks()">
        <button class="ask-btn" onclick="searchTasks()">Cerca ↗</button>
      </div>

      <div class="task-list" id="taskList"></div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let mode = 'shell';
  let tasks = [];
  let showExplain = {};

  try { tasks = JSON.parse(localStorage.getItem('autocli_v2') || '[]'); } catch(_) {}

  // ── Mode ───────────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.getElementById('tab-shell').className =
      'tab' + (m === 'shell' ? ' active-shell' : '');
    document.getElementById('tab-cisco').className =
      'tab' + (m === 'cisco' ? ' active-cisco' : '');
    document.getElementById('promptInput').placeholder = m === 'cisco'
      ? 'es. Configura VLAN 100 su Gi0/1 con nome MGMT...'
      : 'es. Crea backup giornaliero con cron e rsync...';
  }

  // ── Claude API ─────────────────────────────────────────────────────────────
  async function callClaude(system, userMsg) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
    return (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
      .trim();
  }

  // ── Generate ───────────────────────────────────────────────────────────────
  async function generateCmds() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;

    const btn     = document.getElementById('genBtn');
    const preview = document.getElementById('preview');

    btn.disabled = true;
    preview.className = 'preview loading';
    preview.textContent = 'Generazione in corso...';

    const system = mode === 'cisco'
      ? `Sei un Senior Network Engineer Cisco IOS.
Genera SOLO i comandi CLI necessari, un comando per riga.
Inizia SEMPRE con: enable\nconfigure terminal
Termina SEMPRE con: end\nwrite memory
Nessun commento, nessun markdown, nessuna spiegazione. Solo comandi.`
      : `Sei un Senior Linux/DevOps engineer.
Genera SOLO i comandi Bash necessari, un comando per riga.
Nessun commento, nessun markdown, nessuna spiegazione. Solo comandi eseguibili.`;

    try {
      const text = await callClaude(system, prompt);
      const clean = text.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
      preview.className = 'preview';
      preview.textContent = clean;
    } catch (e) {
      preview.className = 'preview error';
      preview.textContent = 'Errore: ' + e.message;
    }

    btn.disabled = false;
  }

  // ── Save ───────────────────────────────────────────────────────────────────
  function saveTask() {
    const name = document.getElementById('promptInput').value.trim();
    const cmds = document.getElementById('preview').textContent.trim();

    if (!name || !cmds
        || cmds === '// i comandi appariranno qui'
        || cmds.startsWith('Errore')
        || cmds === 'Generazione in corso...') {
      showToast('Genera prima i comandi!', true);
      return;
    }

    tasks.unshift({
      id:       Date.now(),
      name,
      mode,
      commands: cmds.split('\n').filter(c => c.trim()),
      explain:  null
    });

    persist();
    renderTasks(tasks);
    showToast('Salvato!');
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  function deleteTask(id) {
    if (!confirm('Eliminare questo task?')) return;
    tasks = tasks.filter(t => t.id !== id);
    delete showExplain[id];
    persist();
    renderTasks(tasks);
  }

  // ── Clear all ──────────────────────────────────────────────────────────────
  function clearAll() {
    if (!tasks.length) return;
    if (!confirm('Svuotare tutta la libreria?')) return;
    tasks = [];
    showExplain = {};
    persist();
    renderTasks(tasks);
  }

  // ── Explain ────────────────────────────────────────────────────────────────
  async function explainTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    // Toggle off if already loaded
    if (task.explain) {
      showExplain[id] = !showExplain[id];
      renderTasks(tasks);
      return;
    }

    showToast('Analisi in corso...');

    const system = `Sei un esperto di CLI e networking. Spiega brevemente (2-4 righe, linguaggio semplice, in italiano) cosa fa nel complesso questa sequenza di comandi. Non elencare ogni singolo comando: fornisci una visione d'insieme dell'obiettivo raggiunto.`;

    try {
      task.explain = await callClaude(system, task.commands.join('\n'));
      showExplain[id] = true;
      persist();
      renderTasks(tasks);
    } catch (e) {
      showToast('Errore spiegazione: ' + e.message, true);
    }
  }

  // ── Export ─────────────────────────────────────────────────────────────────
  function exportTask(id, fmt) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    let content, type, ext;
    const safeName = task.name.replace(/[^a-z0-9]/gi, '_').slice(0, 40);

    if (fmt === 'txt') {
      content = `# ${task.name}\n# Piattaforma: ${task.mode === 'cisco' ? 'Cisco IOS' : 'Shell Linux/Bash'}\n# Generato con AutoCLI\n\n${task.commands.join('\n')}`;
      type = 'text/plain';
      ext  = 'txt';
    } else {
      content = JSON.stringify({
        name:      task.name,
        mode:      task.mode,
        commands:  task.commands,
        explain:   task.explain || null,
        exported:  new Date().toISOString()
      }, null, 2);
      type = 'application/json';
      ext  = 'json';
    }

    const blob = new Blob([content], { type });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `autocli_${safeName}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`Esportato come .${ext}`);
  }

  // ── AI Search ──────────────────────────────────────────────────────────────
  async function searchTasks() {
    const q = document.getElementById('searchInput').value.trim();

    if (!q) { renderTasks(tasks); return; }
    if (!tasks.length) { showToast('Nessun task in libreria.', true); return; }

    showToast('Ricerca AI in corso...');

    const system = `Sei un assistente per filtrare una libreria di comandi CLI.
Ti fornisco un array JSON di task (id, name, mode, primi comandi) e una query utente.
Restituisci SOLO un array JSON con gli ID numerici dei task rilevanti, ordinati per pertinenza.
Esempio: [1234567890, 9876543210]
Nessun testo, nessun markdown, nessuna spiegazione. Solo l'array JSON.`;

    const summary = tasks.map(t => ({
      id:   t.id,
      name: t.name,
      mode: t.mode,
      cmds: t.commands.slice(0, 4)
    }));

    try {
      const raw  = await callClaude(system, `Task: ${JSON.stringify(summary)}\nQuery: "${q}"`);
      const ids  = JSON.parse(raw.replace(/```json?|```/g, '').trim());
      const list = ids.map(id => tasks.find(t => t.id === id)).filter(Boolean);

      renderTasks(list.length ? list : tasks);
      showToast(list.length
        ? `${list.length} risultat${list.length === 1 ? 'o' : 'i'} trovat${list.length === 1 ? 'o' : 'i'}`
        : 'Nessun risultato, mostro tutti');
    } catch (e) {
      renderTasks(tasks);
      showToast('Ricerca fallita, mostro tutti.', true);
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderTasks(list) {
    const el = document.getElementById('taskList');
    el.innerHTML = '';

    if (!list.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = tasks.length
        ? '// nessun risultato per questa ricerca'
        : '// nessun task salvato\n// genera un comando e premi "Salva in libreria"';
      el.appendChild(empty);
      return;
    }

    list.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';

      // Head
      const head = document.createElement('div');
      head.className = 'card-head';

      const nameEl = document.createElement('span');
      nameEl.className = 'card-name';
      nameEl.textContent = t.name;

      const badge = document.createElement('span');
      badge.className = 'badge badge-' + t.mode;
      badge.textContent = t.mode === 'cisco' ? 'Cisco IOS' : 'Shell';

      head.appendChild(nameEl);
      head.appendChild(badge);

      // Commands
      const cmdsEl = document.createElement('div');
      cmdsEl.className = 'card-cmds';

      t.commands.forEach(cmd => {
        const line = document.createElement('div');
        line.className = 'cmd-line';

        const sym = document.createElement('span');
        sym.className = 'prompt-sym';
        sym.textContent = t.mode === 'cisco' ? '#' : '$';

        const txt = document.createElement('span');
        txt.className = 'cmd-text';
        txt.textContent = cmd;

        line.appendChild(sym);
        line.appendChild(txt);
        cmdsEl.appendChild(line);
      });

      // Explain block (if visible)
      const explainBlock = document.createElement('div');
      if (t.explain && showExplain[t.id]) {
        explainBlock.className = 'explain-block';
        explainBlock.textContent = t.explain;
      }

      // Footer
      const foot = document.createElement('div');
      foot.className = 'card-foot';

      const explainBtn = document.createElement('button');
      explainBtn.className = 'foot-btn explain';
      explainBtn.textContent = t.explain && showExplain[t.id] ? 'Nascondi' : 'Spiega';
      explainBtn.onclick = () => explainTask(t.id);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'foot-btn';
      copyBtn.textContent = 'Copia';
      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(t.commands.join('\n'));
        showToast('Copiato!');
      };

      const expTxt = document.createElement('button');
      expTxt.className = 'foot-btn';
      expTxt.textContent = 'Esporta .txt';
      expTxt.onclick = () => exportTask(t.id, 'txt');

      const expJson = document.createElement('button');
      expJson.className = 'foot-btn';
      expJson.textContent = 'Esporta .json';
      expJson.onclick = () => exportTask(t.id, 'json');

      const delBtn = document.createElement('button');
      delBtn.className = 'foot-btn danger';
      delBtn.textContent = 'Elimina';
      delBtn.onclick = () => deleteTask(t.id);

      foot.appendChild(explainBtn);
      foot.appendChild(copyBtn);
      foot.appendChild(expTxt);
      foot.appendChild(expJson);
      foot.appendChild(delBtn);

      card.appendChild(head);
      card.appendChild(cmdsEl);
      if (t.explain && showExplain[t.id]) card.appendChild(explainBlock);
      card.appendChild(foot);
      el.appendChild(card);
    });
  }

  // ── Persist ────────────────────────────────────────────────────────────────
  function persist() {
    localStorage.setItem('autocli_v2', JSON.stringify(tasks));
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isErr ? ' err' : '');
    clearTimeout(t._t);
    t._t = setTimeout(() => { t.className = 'toast'; }, 2800);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  renderTasks(tasks);
</script>
</body>
</html>
